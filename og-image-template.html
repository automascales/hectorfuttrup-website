<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #f2ede4;
      display: flex;
      overflow: hidden;
    }
    .left {
      flex: 0 0 58%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px 56px 64px 80px;
    }
    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #1a1410;
      opacity: 0.4;
      margin-bottom: 28px;
    }
    .name {
      font-family: 'Playfair Display', serif;
      font-size: 96px;
      font-weight: 700;
      line-height: 0.92;
      color: #1a1410;
      letter-spacing: -0.01em;
      margin-bottom: 36px;
    }
    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #1a1410;
      opacity: 0.45;
    }
    .divider {
      width: 1px;
      background: rgba(26,20,16,0.08);
      height: 100%;
    }
    .right {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .right img {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      height: 110%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="left">
    <span class="eyebrow">Venture Founder</span>
    <div class="name">HECTOR<br>FUTTRUP</div>
    <span class="tagline">AI &nbsp;·&nbsp; 17 &nbsp;·&nbsp; Copenhagen</span>
  </div>
  <div class="divider"></div>
  <div class="right">
    <img src="images/sculpture.png" alt="" />
  </div>
</body>
</html>
